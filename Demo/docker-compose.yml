services:
  backend:
    build:
      context: ./backend
    ports:
      - "${DEMO_BACKEND_HOST_PORT:-18000}:18000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - POSTGRES_HOST=host.docker.internal
      - POSTGRES_PORT=15430
      - DEMO_DATABASE_URL_30=${DEMO_DATABASE_URL_30:-}
      - DEMO_DATABASE_URL_40=${DEMO_DATABASE_URL_40:-}
      - DEMO_DATABASE_URL_60=${DEMO_DATABASE_URL_60:-}
      - DEMO_POSTGRES_30_PORT=15430
      - DEMO_POSTGRES_40_PORT=15440
      - DEMO_POSTGRES_60_PORT=15600
      - POSTGRES_USER=jdcvcns
      - POSTGRES_PASSWORD=jdcvcns_dev_password
      - POSTGRES_DB=jdcvcns

  frontend:
    build:
      context: ./frontend
    ports:
      - "${DEMO_FRONTEND_HOST_PORT:-15173}:15173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=${VITE_API_URL:-http://localhost:18000/api}
