<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CV/JD Matcher</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <main class="shell">
    <section class="toolbar">
      <div>
        <h1>CV/JD Matcher</h1>
        <p id="apiStatus">Checking API...</p>
      </div>
      <button id="runButton" type="button">Run Match</button>
    </section>

    <section class="controls">
      <label>
        API URL
        <input id="apiUrl" value="http://localhost:8000">
      </label>
      <label>
        Dataset Directory
        <input id="datasetDir" value="Dataset">
      </label>
      <label>
        Top Fit
        <input id="topK" type="number" min="1" max="100" value="10">
      </label>
      <label class="checkbox">
        <input id="fallback" type="checkbox">
        Use fallback embeddings
      </label>
    </section>

    <section class="summary" id="summary"></section>

    <section class="tableWrap">
      <table>
        <thead>
          <tr>
            <th>CV</th>
            <th>Rank</th>
            <th>JD</th>
            <th>Score</th>
          </tr>
        </thead>
        <tbody id="matchesBody">
          <tr><td colspan="4">No run yet.</td></tr>
        </tbody>
      </table>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
