services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "${POSTGRES_HOST_PORT:-15430}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jdcvcns}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jdcvcns_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-jdcvcns}
    volumes:
      - postgres_data_30:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "${QDRANT_HOST_PORT:-16330}:6333"
    volumes:
      - qdrant_data_30:/qdrant/storage

  test:
    image: python:3.11-slim
    working_dir: /workspace/3.0
    volumes:
      - .:/workspace/3.0
      - ../Data:/workspace/Data
      - cache_30:/workspace/3.0/.cache
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-jdcvcns}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jdcvcns_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-jdcvcns}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      STORE_DB: ${STORE_DB:-1}
      TOP_K: ${TOP_K:-5}
      BGE_BATCH_SIZE: ${BGE_BATCH_SIZE:-64}
      HARDWARE_TARGET_PERCENT: ${HARDWARE_TARGET_PERCENT:-95}
      GPU_MEMORY_FRACTION: ${GPU_MEMORY_FRACTION:-0.95}
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-}
      MKL_NUM_THREADS: ${MKL_NUM_THREADS:-}
      OPENBLAS_NUM_THREADS: ${OPENBLAS_NUM_THREADS:-}
      TOKENIZERS_PARALLELISM: ${TOKENIZERS_PARALLELISM:-true}
      HF_ENABLE_PARALLEL_LOADING: ${HF_ENABLE_PARALLEL_LOADING:-true}
      QDRANT_UPSERT_BATCH_SIZE: ${QDRANT_UPSERT_BATCH_SIZE:-1}
      QDRANT_TIMEOUT: ${QDRANT_TIMEOUT:-300}
      QDRANT_UPSERT_RETRIES: ${QDRANT_UPSERT_RETRIES:-3}
      PREFETCH_MULTIPLIER: ${PREFETCH_MULTIPLIER:-4}
      BGE_M3_MODEL: ${BGE_M3_MODEL:-BAAI/bge-m3}
    depends_on:
      postgres:
        condition: service_started
      qdrant:
        condition: service_started
    command: >
      sh -lc "apt-get update && apt-get install -y build-essential
      && pip install --no-cache-dir -r requirements.txt
      && python3 bgmewdranttesting3.0.py"

volumes:
  postgres_data_30:
  qdrant_data_30:
  cache_30:
