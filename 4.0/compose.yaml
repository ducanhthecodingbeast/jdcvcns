services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "${POSTGRES_HOST_PORT:-15440}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jdcvcns}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jdcvcns_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-jdcvcns}
    volumes:
      - postgres_data_40:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.12.5
    profiles: ["qdrant"]
    ports:
      - "${QDRANT_HOST_PORT:-16340}:6333"
    volumes:
      - qdrant_data_40:/qdrant/storage

  test:
    image: python:3.11-slim
    working_dir: /workspace/4.0
    volumes:
      - .:/workspace/4.0
      - ../Data:/workspace/Data
      - cache_40:/workspace/4.0/.cache
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-jdcvcns}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jdcvcns_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-jdcvcns}
      VECTOR_BACKEND: ${VECTOR_BACKEND:-pinecone}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      PINECONE_HOST: ${PINECONE_HOST:-http://host.docker.internal:15080}
      PINECONE_INDEX_HOST: ${PINECONE_INDEX_HOST:-}
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}
      PINECONE_INDEX: ${PINECONE_INDEX:-}
      PINECONE_NAMESPACE: ${PINECONE_NAMESPACE:-}
      PINECONE_ALPHA: ${PINECONE_ALPHA:-0.75}
      STORE_DB: ${STORE_DB:-1}
      TOP_K: ${TOP_K:-10}
      BGE_BATCH_SIZE: ${BGE_BATCH_SIZE:-64}
      HARDWARE_TARGET_PERCENT: ${HARDWARE_TARGET_PERCENT:-95}
      GPU_MEMORY_FRACTION: ${GPU_MEMORY_FRACTION:-0.95}
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-}
      MKL_NUM_THREADS: ${MKL_NUM_THREADS:-}
      OPENBLAS_NUM_THREADS: ${OPENBLAS_NUM_THREADS:-}
      TOKENIZERS_PARALLELISM: ${TOKENIZERS_PARALLELISM:-true}
      HF_ENABLE_PARALLEL_LOADING: ${HF_ENABLE_PARALLEL_LOADING:-true}
      QDRANT_UPSERT_BATCH_SIZE: ${QDRANT_UPSERT_BATCH_SIZE:-1}
      QDRANT_TIMEOUT: ${QDRANT_TIMEOUT:-300}
      QDRANT_UPSERT_RETRIES: ${QDRANT_UPSERT_RETRIES:-3}
      VIRANKER_BATCH_SIZE: ${VIRANKER_BATCH_SIZE:-64}
      VIRANKER_MAX_LENGTH: ${VIRANKER_MAX_LENGTH:-1024}
      VIRANKER_QUERY_MAX_LENGTH: ${VIRANKER_QUERY_MAX_LENGTH:-384}
      VIRANKER_NORMALIZE: ${VIRANKER_NORMALIZE:-1}
      WRITE_RESULTS: ${WRITE_RESULTS:-0}
      PREFETCH_MULTIPLIER: ${PREFETCH_MULTIPLIER:-4}
      BGE_M3_MODEL: ${BGE_M3_MODEL:-BAAI/bge-m3}
      VIRANKER_MODEL: ${VIRANKER_MODEL:-namdp-ptit/ViRanker}
    depends_on:
      postgres:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -lc "apt-get update && apt-get install -y build-essential
      && pip install --no-cache-dir -r requirements.txt
      && python3 virankertesting4.0.py"

volumes:
  postgres_data_40:
  qdrant_data_40:
  cache_40:
