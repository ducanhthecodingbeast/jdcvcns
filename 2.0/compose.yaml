services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "${POSTGRES_HOST_PORT:-15420}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jdcvcns}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jdcvcns_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-jdcvcns}
    volumes:
      - postgres_data_20:/var/lib/postgresql/data

  test:
    image: python:3.11-slim
    working_dir: /workspace/2.0
    volumes:
      - .:/workspace/2.0
      - ../Data:/workspace/Data
      - ../Dataset:/workspace/Dataset
      - cache_20:/workspace/2.0/.cache
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-jdcvcns}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jdcvcns_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-jdcvcns}
      STORE_DB: ${STORE_DB:-1}
      TOP_K: ${TOP_K:-10}
      TEST_FILE: ${TEST_FILE:-dotpdtesting2.3.py}
    depends_on:
      - postgres
    command: >
      sh -lc "apt-get update && apt-get install -y build-essential
      && pip install --no-cache-dir -r requirements.txt
      && python3 $${TEST_FILE}"

volumes:
  postgres_data_20:
  cache_20:
