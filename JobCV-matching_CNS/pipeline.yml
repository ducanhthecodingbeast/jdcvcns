root: .

dataset:
  directory: Dataset
  required_files:
    jd: Dataset/jd.csv
    cv:
      - Dataset/cv.csv
      - Dataset/mockcv.csv
  preprocessing_scripts:
    - Dataset/data preprocessing.py

scripts:
  default:
    - 1.0/dotpdtesting1.0.py
    - 2.0/dotpdtesting2.0.py
    - 2.0/dotpdtesting2.1.py
    - 2.0/dotpdtesting2.2.py
    - 2.0/dotpdtesting2.3.py
  heavy:
    - 3.0/bgmewdranttesting3.0.py

options:
  skip_download: false
  force: false
  top_k: 10
  max_workers: 0
  include_heavy: false

environment:
  STORE_DB: "1"
  TOP_K: "10"
  PYTHONPATH: .

steps:
  - name: prepare_dataset
    enabled_unless: skip_download
    command: python "{preprocessing_script}"
    force_argument: --force
    skip_when:
      all_exist:
        - Dataset/jd.csv
      any_exist:
        - Dataset/cv.csv
        - Dataset/mockcv.csv

  - name: run_default_experiments
    command: python "{script}"
    scripts_ref: scripts.default
    concurrent: false

  - name: run_heavy_experiments
    enabled_when: include_heavy
    command: python "{script}"
    scripts_ref: scripts.heavy
    concurrent: false

output:
  dashboard_url: http://localhost:8000/
  result_fields:
    - script_count
    - failed_count
    - elapsed_seconds
    - results
