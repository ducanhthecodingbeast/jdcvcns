services:
  all:
    image: python:slim
    working_dir: /workspace
    volumes:
      - ..:/workspace
      - dataset_cache:/workspace/.cache
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      KAGGLE_USERNAME: ${KAGGLE_USERNAME:-}
      KAGGLE_KEY: ${KAGGLE_KEY:-}
      HF_HOME: /workspace/.cache/huggingface
      SENTENCE_TRANSFORMERS_HOME: /workspace/.cache/sentence-transformers
      OLLAMA_GENERATE_URL: ${OLLAMA_GENERATE_URL:-http://host.docker.internal:16434/api/generate}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3.5:9b}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-120}
      MOCKCV_ARGS: ${MOCKCV_ARGS:---force}
    command: >
      sh -lc "pip install --no-cache-dir -r Dataset/requirements.txt
      && python Dataset/data_preprocessing.py
      && python -m Dataset.mockcv $${MOCKCV_ARGS}"

  preprocess:
    profiles: ["manual"]
    image: python:slim
    working_dir: /workspace
    volumes:
      - ..:/workspace
      - dataset_cache:/workspace/.cache
    environment:
      KAGGLE_USERNAME: ${KAGGLE_USERNAME:-}
      KAGGLE_KEY: ${KAGGLE_KEY:-}
      HF_HOME: /workspace/.cache/huggingface
      SENTENCE_TRANSFORMERS_HOME: /workspace/.cache/sentence-transformers
    command: >
      sh -lc "pip install --no-cache-dir -r Dataset/requirements.txt
      && python Dataset/data_preprocessing.py"

  mockcv:
    profiles: ["manual"]
    image: python:slim
    working_dir: /workspace
    volumes:
      - ..:/workspace
      - dataset_cache:/workspace/.cache
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_GENERATE_URL: ${OLLAMA_GENERATE_URL:-http://host.docker.internal:16434/api/generate}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3.5:9b}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-120}
      MOCKCV_ARGS: ${MOCKCV_ARGS:---check-only}
    command: >
      sh -lc "pip install --no-cache-dir -r Dataset/requirements.txt
      && python -m Dataset.mockcv $${MOCKCV_ARGS}"

volumes:
  dataset_cache:
